name: CI/CD Frontend

on:
  push:
    branches:
      - deploy

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build y Push imagen Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: ./Dockerfile
          target: production
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/innovatech-frontend:latest

      - name: Deploy en EC2 Frontend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST_FRONTEND }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker stop innovatech_frontend || true
            docker rm innovatech_frontend || true
            docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/innovatech-frontend:latest
            docker run -d \
              --name innovatech_frontend \
              --restart unless-stopped \
              -p 80:80 \
              ${{ secrets.DOCKER_HUB_USERNAME }}/innovatech-frontend:latest